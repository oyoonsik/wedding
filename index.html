<?php

// 모바일 체크
$mobileArray = array("iphone", "lgtelecom", "skt", "mobile", "samsung", "nokia", "blackberry", "android", "sony", "phone");
$checkCount = 0;
for($num = 0; $num < sizeof($mobileArray); $num++) {
	if(preg_match("/$mobileArray[$num]/", strtolower($_SERVER['HTTP_USER_AGENT']))) {
	    $checkCount++;
        break;
   	}
}

if ($checkCount >= 1) {
	include 'mobile.html';
} else {
	include 'pc.html';
}


?>
